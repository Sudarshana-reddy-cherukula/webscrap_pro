version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: webscrap-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: webscrap_pro

  backend:
    build: ./backend
    container_name: webscrap-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/webscrap_pro
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100

  frontend:
    build: ./frontend
    container_name: webscrap-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api

volumes:
  mongo-data:
