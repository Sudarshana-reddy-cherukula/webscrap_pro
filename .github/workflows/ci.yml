name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for Docker Compose
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-test-secret-do-not-use-in-production' }}" >> .env
          echo "MONGO_URI=${{ secrets.MONGO_URI || 'mongodb://mongodb:27017/webscrap_pro' }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL || 'http://localhost:3000' }}" >> .env

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build
